<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlwaysReady — Email Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #faf9f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .wrapper {
      padding: 40px 20px;
    }
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(1,77,78,0.12);
    }
    .header {
      background-color: #014D4E;
      padding: 28px 40px;
      text-align: left;
      border-bottom: 4px solid #ffd700;
    }
    .header span {
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header span em {
      color: #00b8a6;
      font-style: normal;
    }
    .body {
      padding: 40px 40px 32px;
      background-color: #ffffff;
    }
    .body p {
      margin: 0 0 18px;
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a1a;
    }
    .body p:last-child {
      margin-bottom: 0;
    }
    .footer {
      background-color: #faf9f6;
      border-top: 1px solid #e8e6e0;
      padding: 20px 40px;
      text-align: center;
    }
    .footer p {
      margin: 0;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }
    .preview-bar {
      max-width: 600px;
      margin: 0 auto 16px;
      background: #014D4E;
      border-radius: 6px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .preview-bar select {
      flex: 1;
      background: #00b8a6;
      color: #014D4E;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .preview-bar label {
      color: #ffd700;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="preview-bar">
    <label>Preview email:</label>
    <select id="emailSelector" onchange="showEmail(this.value)">
      <option value="1">Week 1 — Welcome</option>
      <option value="2">Week 2 — Setting up your team</option>
      <option value="3">Week 3 — Getting the most from KLOEs</option>
      <option value="4">Week 4 — Building your evidence library</option>
      <option value="5">Week 5 — The Daily Report</option>
      <option value="6">Week 6 — The Audit Trail</option>
      <option value="7">Week 7 — Visitor access</option>
      <option value="8">Week 8 — The Trend Report</option>
      <option value="9">Week 9 — The HR module</option>
      <option value="10">Week 10 — How we keep your data safe</option>
      <option value="11">Week 11 — Your data, your rights</option>
      <option value="12">Week 12 — Thank you and what's next</option>
    </select>
  </div>

  <div id="subject-line" style="max-width:600px;margin:0 auto 8px;font-size:12px;color:#64748b;padding:0 4px;">
    <strong>Subject:</strong> <span id="subject-text"></span>
  </div>

  <div class="email-container">
    <div class="header">
      <span>Always<em>Ready</em></span>
    </div>
    <div class="body" id="email-body"></div>
    <div class="footer">
      <p>AlwaysReady is a product of Parker Digital &amp; Print Services Ltd<br>
      82A James Carter Road, Mildenhall, IP28 7DE<br>
      You are receiving this email because you subscribed to AlwaysReady.</p>
    </div>
  </div>

</div>

<script>
const emails = {
  1: {
    subject: "Welcome to AlwaysReady",
    body: `<p>Dear [Name],</p>
<p>Welcome to AlwaysReady. We are delighted to have you on board.</p>
<p>AlwaysReady is designed to help care providers like you prepare for CQC inspections with confidence. Over the coming weeks, we will be sending you a short series of emails. Each one will focus on a different part of the platform and how to get the most from it.</p>
<p>This week, we would encourage you to start building your evidence base. Evidence is at the heart of inspection readiness. The stronger your evidence, the more confident you can be when an inspector arrives.</p>
<p>Log in and take a look at your KLOE ratings. Begin with the areas where you feel least confident. Add notes, upload documents, and start recording the work you are doing to improve.</p>
<p>You do not need everything to be perfect before you begin. The important thing is to start.</p>
<p>We also publish regular articles on CQC compliance, inspection preparation, and care sector best practice on our blog at alwaysready.uk/blog. We hope you find it a useful resource alongside the platform.</p>
<p>If you have any questions, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  2: {
    subject: "Setting up your team on AlwaysReady",
    body: `<p>Dear [Name],</p>
<p>This week we would like to focus on your team.</p>
<p>AlwaysReady is built to be used across your organisation. You can invite staff members to the platform and assign them specific KLOEs to manage. KLOEs are the Key Lines of Enquiry that CQC uses to assess your service. Against each KLOE, your team can add evidence, update ratings, and record the work they are doing.</p>
<p>Sharing responsibility across your team has a number of benefits. It distributes the workload. It gives your staff ownership of the areas they are responsible for. And it means that evidence is being added regularly, rather than all at once before an inspection.</p>
<p>To invite a team member, go to the Team section in the main navigation. From there you can add staff, assign roles, and control what each person can see and do within the platform.</p>
<p>If you have any questions about setting up your team, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  3: {
    subject: "Getting the most from your KLOEs",
    body: `<p>Dear [Name],</p>
<p>This week we want to share some tips on how to get the most from the KLOE section of AlwaysReady.</p>
<p>CQC inspections are mainly unannounced. That means you cannot rely on knowing an inspection is coming before you start preparing. The providers that perform best are those who keep their KLOE ratings current and their evidence up to date as a matter of routine.</p>
<p>Here are three things we would encourage you to do this week.</p>
<p>Start work on your weakest KLOEs. It can be tempting to focus on the areas where you are already strong. But inspectors will pay close attention to the areas where improvement is needed. Identify your lowest-rated KLOEs and begin building evidence against them.</p>
<p>Review the rating descriptions. Each KLOE includes CQC's own rating characteristics, which describe what Outstanding, Good, Requires Improvement, and Inadequate look like in practice. Reading these carefully will help you understand exactly what inspectors are looking for.</p>
<p>Add specific, dated evidence. Vague statements are less convincing than concrete examples. When you add a note or upload a document, be as specific as you can about what you did, when you did it, and what the outcome was.</p>
<p>If you have any questions, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  4: {
    subject: "Building your evidence library",
    body: `<p>Dear [Name],</p>
<p>This week we would like to focus on evidence.</p>
<p>Evidence is what turns a good intention into a demonstrable fact. When a CQC inspector asks how you know your service is safe, well-led, or responsive, your evidence library is your answer.</p>
<p>AlwaysReady allows you to upload documents directly against each KLOE. Policies, procedures, meeting minutes, training records, audits, satisfaction surveys, and staff supervision records are all examples of the kind of evidence that supports a strong inspection outcome.</p>
<p>Here are a few things to keep in mind as you build your library.</p>
<p>Quality matters more than quantity. A small number of clear, relevant, and recent documents is more useful than a large collection of outdated or generic materials.</p>
<p>Keep it current. Evidence that is more than a year old may not reflect your current practice. Aim to review and refresh your evidence regularly.</p>
<p>Cover all five key questions. CQC assesses providers against five key questions: Safe, Effective, Caring, Responsive, and Well-led. Make sure you have evidence that speaks to each of them.</p>
<p>If you have any questions about managing your evidence, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  5: {
    subject: "Have you tried the Daily Report?",
    body: `<p>Dear [Name],</p>
<p>This week we would like to introduce you to the Daily Report.</p>
<p>The Daily Report gives you a snapshot of where your compliance stands right now. It shows you which KLOEs are up to date, which are due for review, and which have never been assessed. It is designed to be the first thing you check each morning.</p>
<p>Think of it as your daily dashboard. It tells you where attention is needed so that nothing slips through the net.</p>
<p>You can access the Daily Report from the main navigation inside the platform. We would encourage you to make it part of your daily routine. Even a quick five-minute check each morning can make a significant difference to how prepared you feel over time.</p>
<p>If you have any questions about the Daily Report, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  6: {
    subject: "Your AlwaysReady audit trail",
    body: `<p>Dear [Name],</p>
<p>This week we would like to draw your attention to the Audit Trail.</p>
<p>Every change made in AlwaysReady is recorded. When a KLOE rating is updated, when a note is added, when a file is uploaded, a timestamped entry is created in the audit trail. It shows who made the change and when.</p>
<p>This matters for two reasons.</p>
<p>First, it gives you an accurate record of how your compliance position has changed over time. You can see exactly what work has been done and by whom.</p>
<p>Second, it provides evidence of continuous improvement. CQC inspectors are interested not just in where you are now, but in the journey you have been on. An audit trail that shows consistent, sustained effort over time is a powerful thing to be able to demonstrate.</p>
<p>You can access the Audit Trail from the main navigation inside the platform.</p>
<p>If you have any questions, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  7: {
    subject: "Sharing access with external visitors",
    body: `<p>Dear [Name],</p>
<p>This week we would like to tell you about visitor access.</p>
<p>There are times when you may want to give someone outside your organisation a temporary view of your compliance position. A CQC inspector, for example, may ask to see your compliance records during an inspection. A local authority contract manager may want to review your readiness ahead of a monitoring visit.</p>
<p>AlwaysReady allows you to create a time-limited visitor login for exactly these situations. The visitor can view your KLOE ratings and evidence without being able to make any changes. You control how long the access lasts, and you can revoke it at any time.</p>
<p>To set up a visitor login, go to the Team section in the main navigation and select the visitor access option.</p>
<p>If you have any questions about visitor access, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  8: {
    subject: "Track your progress with the Trend Report",
    body: `<p>Dear [Name],</p>
<p>This week we would like to introduce you to the Trend Report.</p>
<p>The Trend Report is a tool that demonstrates your compliance position over time. It shows how your KLOE ratings have changed since you started using AlwaysReady, giving you a clear picture of the progress you have made.</p>
<p>This is useful in several ways. It helps you see which areas have improved and which still need attention. It gives you something concrete to share with your board, your local authority, or your CQC inspector. And it serves as a record of the sustained effort your team has put in.</p>
<p>The Trend Report is most useful when you have been using the platform consistently for several weeks. If you have been keeping your ratings up to date, you should already be starting to see a picture emerge.</p>
<p>You can access the Trend Report from the main navigation inside the platform.</p>
<p>If you have any questions, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  9: {
    subject: "The AlwaysReady HR module",
    body: `<p>Dear [Name],</p>
<p>This week we would like to focus on the HR module, an area that CQC inspectors pay close attention to, particularly in relation to the Well-led and Safe key questions.</p>
<p>The HR module in AlwaysReady is designed to help you keep your staff records in order. It covers the information that inspectors are most likely to ask about: DBS checks, right to work documentation, training records, supervision and appraisal history, and employment status.</p>
<p>Keeping these records current is not just about compliance. It is about being able to demonstrate, quickly and confidently, that your team is properly recruited, trained, and supported.</p>
<p>Here are a few things we would encourage you to do this week.</p>
<p>Check that all staff records are complete. Look for any gaps in DBS checks, training certificates, or supervision dates.</p>
<p>Set a reminder for upcoming renewals. DBS checks and certain training certificates have expiry dates. Keeping on top of these is one of the most practical things you can do to stay inspection-ready.</p>
<p>Add staff who are not yet on the system. The more complete your records, the stronger your position when an inspector asks to see them.</p>
<p>You can access the HR module from the main navigation inside the platform.</p>
<p>If you have any questions, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  10: {
    subject: "How AlwaysReady keeps your data safe",
    body: `<p>Dear [Name],</p>
<p>This week we would like to tell you about how we protect the data you store in AlwaysReady.</p>
<p>We understand that the information you enter into the platform is sensitive. Staff HR records, supervision notes, and compliance documentation are not things that should be left unsecured. Here is what we do to keep your data safe.</p>
<p>All data is encrypted at rest and in transit. This means your information is protected whether it is being stored or moving between your device and our servers. Every file you upload is automatically scanned for viruses and malware before it is stored. Your data is held within the European Union and is not transferred outside of it. Each organisation's data is completely isolated from all other organisations on the platform. Nobody else can see your records.</p>
<p>We take data protection seriously, and we are committed to full compliance with the UK General Data Protection Regulation. AlwaysReady acts as a data processor on your behalf. You remain the data controller and retain full ownership of your data at all times. A Data Processing Agreement is available on request.</p>
<p>You can read our full Data Security Statement and Data Retention Policy in the Help section inside the platform.</p>
<p>If you have any questions about data security, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  11: {
    subject: "Your data, your rights",
    body: `<p>Dear [Name],</p>
<p>Last week we explained how we keep your data safe. This week we want to talk about your rights in relation to that data.</p>
<p>Under the UK General Data Protection Regulation, individuals whose personal data is held within AlwaysReady have certain rights. They have the right to access the data held about them. They have the right to request that inaccurate data be corrected. They have the right to request that their data be deleted in certain circumstances. And they have the right to object to certain types of processing.</p>
<p>As the data controller, your organisation is responsible for handling these requests from your staff. If a member of staff asks to see the information you hold about them in AlwaysReady, you are responsible for providing it.</p>
<p>If you receive a data subject access request and are unsure how to respond, we would encourage you to seek appropriate legal advice. You can also find general guidance on the Information Commissioner's Office website at ico.org.uk.</p>
<p>We are here to help you fulfil your obligations as a data controller. If you have any questions about how we process data on your behalf, the Support tab inside the platform is the best place to reach us.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>`
  },
  12: {
    subject: "Twelve weeks in — thank you, and what's next",
    body: `<p>Dear [Name],</p>
<p>Twelve weeks ago you started your AlwaysReady journey. We hope the platform has become a useful part of how you manage your compliance, and that you feel more confident and prepared than you did at the start.</p>
<p>Over the past three months, we have walked you through the key features of the platform. You have had the chance to build your evidence base, manage your team records, review your KLOE ratings, track your progress over time, and keep a clear audit trail of everything you have done.</p>
<p>Inspection readiness is not a one-off exercise. It is an ongoing commitment. The care providers who fare best in CQC inspections are those who make compliance part of their everyday routine rather than something they rush to prepare for when an inspection is announced.</p>
<p>You are already doing that. Keep going.</p>
<p>Here is what we would encourage you to focus on in the weeks ahead. Continue reviewing your lowest-rated KLOEs and building evidence against them. Keep your HR records current, particularly DBS renewals, training certificates, and supervision records. Use the Trend Report each month to measure your progress and identify where attention is needed.</p>
<p>If there is anything you need from us, the Support tab inside the platform is always there.</p>
<p>Thank you for being an AlwaysReady customer. We are glad you are here.</p>
<p>Kind regards,<br>The AlwaysReady Team</p>
<p><em>P.S. We publish regular articles on CQC compliance, inspection preparation, and care sector best practice on our blog at alwaysready.uk/blog. We hope you find it a useful resource.</em></p>`
  }
};

function showEmail(num) {
  const email = emails[num];
  document.getElementById('email-body').innerHTML = email.body;
  document.getElementById('subject-text').textContent = email.subject;
}

// Show first on load
showEmail(1);
</script>
</body>
</html>
